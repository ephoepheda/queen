    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
      // 1. PASTE YOUR REAL KEYS HERE (Replace the text below)
      const firebaseConfig = {
        apiKey: "PASTE_YOUR_REAL_KEY_HERE",
        authDomain: "queen-burger4.firebaseapp.com",
        projectId: "queen-burger4",
        storageBucket: "queen-burger4.appspot.com",
        messagingSenderId: "PASTE_SENDER_ID",
        appId: "PASTE_APP_ID"
      };

      // 2. Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      // 3. Load Orders Function
      async function loadOrders() {
          const tableBody = document.getElementById('ordersBody');
          tableBody.innerHTML = '<tr><td colspan="6">Loading...</td></tr>';

          try {
              // Get orders from Firestore, sorted by newest
              const snapshot = await db.collection('orders').orderBy('timestamp', 'desc').get();
              
              tableBody.innerHTML = ''; // Clear loading text

              if (snapshot.empty) {
                  tableBody.innerHTML = '<tr><td colspan="6">No orders found.</td></tr>';
                  return;
              }

              snapshot.forEach(doc => {
                  const data = doc.data();
                  const row = document.createElement('tr');

                  // Format items string
                  let itemsHtml = data.items.map(i => `${i.qty}x ${i.name}`).join(', ');

                  // Check if it's an ID or an Image
                  let proofDisplay = '';
                  if (data.proofType === "Transaction ID") {
                      proofDisplay = `<strong>${data.proofId || 'N/A'}</strong>`;
                  } else {
                      proofDisplay = `<a href="${data.proofImage}" target="_blank"><img src="${data.proofImage}" class="proof-img"></a>`;
                  }

                  row.innerHTML = `
                      <td>${data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleTimeString() : 'N/A'}</td>
                      <td>${itemsHtml}</td>
                      <td>ETB ${data.totalAmount}</td>
                      <td>${proofDisplay}</td>
                      <td class="${data.status === 'Pending' ? 'status-pending' : ''}">${data.status}</td>
                      <td>
                          ${data.status === 'Pending' 
                            ? `<button class="btn btn-success" onclick="markCompleted('${doc.id}')">Mark Paid</button>` 
                            : '<span style="color:green;">&#10003;</span>'}
                      </td>
                  `;
                  tableBody.appendChild(row);
              });

          } catch (error) {
              console.error("Error fetching orders:", error);
              alert("Error loading orders. Check console.");
          }
      }

      // Mark as Completed
      async function markCompleted(docId) {
          if(confirm("Are you sure you received the money?")) {
              await db.collection('orders').doc(docId).update({
                  status: 'Completed'
              });
              loadOrders(); // Refresh list
          }
      }

      // Load on start
      loadOrders();
    </script>
